name: Daily Briefing via Email

on:
  push:
    branches: [main]
    paths:
      - 'canonical/briefing-today.md'
      - 'archive/digest/**'
  workflow_dispatch:

jobs:
  email:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify secrets present
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          if [ -z "$GMAIL_USER" ]; then
            echo "::error::GMAIL_USER secret is empty or unset"
            exit 1
          fi
          if [ -z "$GMAIL_APP_PASSWORD" ]; then
            echo "::error::GMAIL_APP_PASSWORD secret is empty or unset"
            exit 1
          fi
          echo "Both secrets present."
      - name: Read briefing
        id: brief
        run: |
          {
            echo "content<<EOF"
            cat canonical/briefing-today.md
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Send email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "📬 Claudious Daily Briefing"
          to: loganallensf@gmail.com
          from: ${{ secrets.GMAIL_USER }}
          body: ${{ steps.brief.outputs.content }}
