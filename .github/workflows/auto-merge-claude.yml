name: Auto-merge Claude routine PRs
on:
  pull_request:
    types: [opened, synchronize]
    branches: [main]
permissions:
  contents: write
  pull-requests: write
jobs:
  auto-merge:
    if: startsWith(github.head_ref, 'claude/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Merge PR
        run: gh pr merge ${{ github.event.pull_request.number }} --squash --delete-branch --admin
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
